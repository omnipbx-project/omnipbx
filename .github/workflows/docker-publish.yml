name: Docker Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  ASTERISK_VERSION: "22.9.0"
  IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY || 'omnipbx-project/omnipbx' }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Validate Python syntax
        run: python3 -m compileall -q apps/app/app scripts/omnipbxctl

      - name: Validate Compose config
        run: |
          cp deploy/.env.example deploy/.env
          docker compose -f deploy/compose.yaml config --quiet
          docker compose -f deploy/compose.yaml -f deploy/compose.dev.yaml config --quiet

  publish:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="$(tr -d '\n' < VERSION)"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/app
          push: true
          build-args: |
            ASTERISK_VERSION=${{ env.ASTERISK_VERSION }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
